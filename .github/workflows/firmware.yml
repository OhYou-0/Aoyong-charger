name: Firmware

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Build firmware
        run: pio run -e seeed_xiao_esp32s3

      - name: Package firmware
        run: |
          mkdir -p dist
          cp .pio/build/seeed_xiao_esp32s3/firmware.bin dist/aoyong-charger-firmware.bin

      - uses: actions/upload-artifact@v4
        with:
          name: aoyong-charger-firmware
          path: dist/aoyong-charger-firmware.bin

      - name: Attach firmware to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/aoyong-charger-firmware.bin --clobber
